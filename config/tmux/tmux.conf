# tmux configuration — optimized for SSH to Codespaces

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on

# --- Prefix ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Pane splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Status bar (Tokyo Night inspired) ---
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26] "
set -g status-right "#[fg=#565f89]%H:%M "
set -g status-left-length 30
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[bg=#292e42,fg=#7aa2f7,bold] #I:#W "

# --- OSC 52 clipboard (works over SSH) ---
set -g set-clipboard on

# --- Window numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- New window in current path ---
bind c new-window -c "#{pane_current_path}"
